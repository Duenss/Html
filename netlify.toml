# Configuración de Netlify

[build]
  publish = "."
  command = ""

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"
  [[headers.values]]
    key = "X-Frame-Options"
    value = "SAMEORIGIN"
  [[headers.values]]
    key = "X-XSS-Protection"
    value = "1; mode=block"
  [[headers.values]]
    key = "Referrer-Policy"
    value = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.{js,css}"
  [[headers.values]]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [[headers.values]]
    Cache-Control = "public, max-age=0, must-revalidate"
